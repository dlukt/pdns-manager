# PowerDNS Authoritative Server - dev configuration.
# This file replaces the image's default /etc/powerdns/pdns.conf (which uses the
# gsqlite3 backend). See docker-compose.dev.yml -> powerdns.volumes.

# Bind authoritative DNS on IPv4 only. Port 5300 avoids both the privileged-port
# binding concern and conflicts with the host's :53 resolver.
local-address=0.0.0.0
local-port=5300

# PostgreSQL backend (gpgsql). Connects to the `postgres` compose service and the
# `pdns` database created by docker/dev/init-pdns-db.sh.
launch=gpgsql
gpgsql-host=postgres
gpgsql-port=5432
gpgsql-dbname=pdns
gpgsql-user=postgres
gpgsql-password=postgres

# HTTP API / webserver. The pdns-manager app connects to :8081.
api=yes
api-key=dev-secret-key
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0,::/0

# Allow additional drop-in config under pdns.d (e.g. the image's startup.py
# writes _api.conf here when PDNS_AUTH_API_KEY is set).
include-dir=/etc/powerdns/pdns.d
